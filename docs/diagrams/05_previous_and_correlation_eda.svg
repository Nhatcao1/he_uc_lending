<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="780" viewBox="0 0 1320 780" role="img" aria-labelledby="title desc">
  <title id="title">Previous Application And Correlation EDA</title>
  <desc id="desc">Previous_application notebook sections split into 16 HE jobs, plus one selected correlation-support job.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 Z" fill="#475569"/></marker>
    <style>.title{font:800 32px ui-sans-serif,system-ui;fill:#172033}.sub{font:400 16px ui-sans-serif,system-ui;fill:#64748b}.h{font:800 17px ui-sans-serif,system-ui;fill:#111827}.t{font:500 14px ui-sans-serif,system-ui;fill:#475569}.small{font:800 12px ui-sans-serif,system-ui;letter-spacing:.08em;fill:#64748b}.num{font:900 32px ui-sans-serif,system-ui;fill:#0f766e}.line{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1320" height="780" fill="#f5f7fb"/>
  <text class="title" x="62" y="62">Previous Application And Correlation EDA</text>
  <text class="sub" x="62" y="92">Notebook 5.15 is exposed as sixteen separate jobs; Notebook 6 is one correlation-support job.</text>

  <g filter="url(#shadow)">
    <rect x="62" y="140" width="250" height="96" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text class="h" x="84" y="174">Raw client data</text>
    <text class="t" x="84" y="201">application_train + previous_application</text>

    <rect x="392" y="140" width="250" height="96" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text class="h" x="414" y="174">Trusted client prep</text>
    <text class="t" x="414" y="201">top-K categories, masks, pair vectors</text>

    <rect x="722" y="140" width="240" height="96" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text class="h" x="744" y="174">HE server</text>
    <text class="t" x="744" y="201">server_home_credit_aggregate</text>

    <rect x="1042" y="140" width="210" height="96" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="h" x="1064" y="174">Client report</text>
    <text class="t" x="1064" y="201">counts, rates, correlations</text>
  </g>
  <path class="line" d="M312 188 H384"/><path class="line" d="M642 188 H714"/><path class="line" d="M962 188 H1034"/>

  <text class="small" x="82" y="304">5.15 PREVIOUS_APPLICATION JOBS</text>
  <g filter="url(#shadow)">
    <rect x="70" y="330" width="360" height="230" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="num" x="94" y="374">16</text>
    <text class="h" x="146" y="372">separate notebook subcriteria</text>
    <text class="t" x="94" y="408">contract type, weekday, cash loan purpose</text>
    <text class="t" x="94" y="432">contract status, payment type, reject reason</text>
    <text class="t" x="94" y="456">suite type, client type, goods category</text>
    <text class="t" x="94" y="480">portfolio, product type, channel type</text>
    <text class="t" x="94" y="504">seller industry, yield group</text>
    <text class="t" x="94" y="528">product combination, insured on approval</text>

    <rect x="480" y="330" width="360" height="230" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="h" x="504" y="372">HE operation per previous job</text>
    <text class="t" x="504" y="408">1. Client one-hot encodes selected column</text>
    <text class="t" x="504" y="432">2. Upload bag filters manifest to that column</text>
    <text class="t" x="504" y="456">3. Server computes sum(mask) for each label</text>
    <text class="t" x="504" y="480">4. Client decrypts value-count table</text>

    <rect x="890" y="330" width="360" height="230" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="h" x="914" y="372">6 Pearson correlation support</text>
    <text class="t" x="914" y="408">Client selects numeric pairs</text>
    <text class="t" x="914" y="432">Server sums valid, x, y, xy, x2, y2</text>
    <text class="t" x="914" y="456">Client computes final Pearson coefficient</text>
  </g>

  <rect x="190" y="642" width="940" height="64" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text class="h" x="218" y="680">Boundary: the server does not parse strings or perform relational joins; the client prepares masks before encryption.</text>
</svg>
