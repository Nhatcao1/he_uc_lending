<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Application Train EDA Criteria</title>
  <desc id="desc">Application_train notebook criteria split into separate HE jobs.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 Z" fill="#475569"/></marker>
    <style>.title{font:800 32px ui-sans-serif,system-ui;fill:#172033}.sub{font:400 16px ui-sans-serif,system-ui;fill:#64748b}.h{font:800 17px ui-sans-serif,system-ui;fill:#111827}.t{font:500 14px ui-sans-serif,system-ui;fill:#475569}.line{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1320" height="760" fill="#f5f7fb"/>
  <text class="title" x="62" y="62">Application_train EDA Criteria</text>
  <text class="sub" x="62" y="92">Notebook 5.1-5.14 becomes separate encrypted jobs, not one vague bucket.</text>

  <g filter="url(#shadow)">
    <rect x="62" y="145" width="230" height="100" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text class="h" x="84" y="180">application_train.csv</text>
    <text class="t" x="84" y="207">raw rows stay client-side</text>

    <rect x="380" y="145" width="260" height="100" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text class="h" x="402" y="180">Trusted client prep</text>
    <text class="t" x="402" y="207">numeric clean, one-hot, TARGET</text>

    <rect x="728" y="145" width="230" height="100" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text class="h" x="750" y="180">HE server</text>
    <text class="t" x="750" y="207">EvalSum and mask sums</text>

    <rect x="1045" y="145" width="210" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="h" x="1067" y="180">Client tables</text>
    <text class="t" x="1067" y="207">means, counts, rates</text>
  </g>
  <path class="line" d="M292 195 H372"/><path class="line" d="M640 195 H720"/><path class="line" d="M958 195 H1037"/>

  <g filter="url(#shadow)">
    <rect x="92" y="330" width="260" height="96" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="h" x="114" y="362">5.1-5.3 AMT distributions</text>
    <text class="t" x="114" y="389">AMT_CREDIT, AMT_INCOME_TOTAL</text>
    <text class="t" x="114" y="410">AMT_GOODS_PRICE</text>

    <rect x="382" y="330" width="260" height="96" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="h" x="404" y="362">5.4, 5.6-5.13 categories</text>
    <text class="t" x="404" y="389">suite, loan, ownership, income</text>
    <text class="t" x="404" y="410">family, occupation, education, etc.</text>

    <rect x="672" y="330" width="260" height="96" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="h" x="694" y="362">5.5 Target balance</text>
    <text class="t" x="694" y="389">default count, repaid count</text>

    <rect x="962" y="330" width="260" height="96" rx="8" fill="#ffffff" stroke="#d6deea"/>
    <text class="h" x="984" y="362">5.14.1-5.14.7 by target</text>
    <text class="t" x="984" y="389">category count plus default count</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="195" y="520" width="930" height="106" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text class="h" x="225" y="558">What the server actually computes</text>
    <text class="t" x="225" y="586">numeric_sum = EvalSum(numeric_vector)</text>
    <text class="t" x="225" y="610">count = sum(category_mask), target_default_count = sum(TARGET), default_count_by_category = sum(category_mask * TARGET)</text>
  </g>
</svg>
