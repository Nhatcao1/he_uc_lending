<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="740" viewBox="0 0 1280 740" role="img" aria-labelledby="title desc">
  <title id="title">Home Credit Linear ML Score</title>
  <desc id="desc">Client trains or defines a simple linear model, encrypts scaled features, server computes CKKS weighted score, client decrypts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2ff"/></linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#475569"/></marker>
    <style>
      .title{font:800 32px ui-sans-serif,system-ui;fill:#172033}.sub{font:400 15px ui-sans-serif,system-ui;fill:#64748b}
      .h{font:800 18px ui-sans-serif,system-ui;fill:#111827}.t{font:500 14px ui-sans-serif,system-ui;fill:#475569}.code{font:700 13px ui-monospace,Menlo,monospace;fill:#3730a3}
      .line{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="740" fill="url(#bg)"/>
  <text class="title" x="60" y="64">Linear ML Score</text>
  <text class="sub" x="60" y="92">Optional encrypted inference path. Training stays plaintext on the client.</text>

  <g filter="url(#shadow)">
    <rect x="68" y="150" width="210" height="110" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="90" y="182">Train or define</text>
    <text class="t" x="90" y="212">small logistic model</text>
    <text class="t" x="90" y="236">client-side only</text>

    <rect x="330" y="150" width="210" height="110" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="352" y="182">Export JSON</text>
    <text class="t" x="352" y="212">weights, bias</text>
    <text class="t" x="352" y="236">mean, scale, fill</text>

    <rect x="592" y="150" width="210" height="110" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="614" y="182">Encrypt features</text>
    <text class="t" x="614" y="212">scaled vectors</text>
    <text class="t" x="614" y="236">score_features/*.bin</text>

    <rect x="854" y="150" width="230" height="110" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text class="h" x="876" y="182">Server weighted sum</text>
    <text class="code" x="876" y="212">bias + sum(x_i * w_i)</text>
    <text class="t" x="876" y="236">plaintext weights</text>
  </g>
  <path class="line" d="M278 205 H322"/>
  <path class="line" d="M540 205 H584"/>
  <path class="line" d="M802 205 H846"/>

  <rect x="126" y="344" width="458" height="154" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text class="h" x="154" y="378">Server input</text>
  <text class="t" x="154" y="408">crypto_context.bin</text>
  <text class="t" x="154" y="432">score_manifest.csv</text>
  <text class="t" x="154" y="456">score_features/*.bin</text>
  <text class="t" x="154" y="480">no raw features, no target, no secret key</text>

  <rect x="696" y="344" width="458" height="154" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text class="h" x="724" y="378">Client output after decrypt</text>
  <text class="code" x="724" y="408">score = decrypted logit-like value</text>
  <text class="code" x="724" y="432">probability = sigmoid(score)</text>
  <text class="t" x="724" y="456">Only if model was trained/exported as logistic.</text>
  <text class="t" x="724" y="480">Demo policy weights are for plumbing only.</text>

  <path class="line" d="M970 260 C970 304 932 318 932 338"/>

  <rect x="210" y="582" width="860" height="72" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="h" x="240" y="612">Scope control</text>
  <text class="t" x="240" y="638">This avoids tree inference, encrypted training, and nonlinear activations. It is simple CKKS inference.</text>
</svg>
