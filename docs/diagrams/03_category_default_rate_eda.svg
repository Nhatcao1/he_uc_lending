<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="740" viewBox="0 0 1280 740" role="img" aria-labelledby="title desc">
  <title id="title">Home Credit Category Default-Rate EDA</title>
  <desc id="desc">Client one-hot encodes categories and target, server computes encrypted counts and masked sums.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f0fdf4"/></linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#475569"/></marker>
    <style>
      .title{font:800 31px ui-sans-serif,system-ui;fill:#172033}.sub{font:400 15px ui-sans-serif,system-ui;fill:#64748b}
      .label{font:800 12px ui-sans-serif,system-ui;letter-spacing:.12em;fill:#475569}.h{font:800 18px ui-sans-serif,system-ui;fill:#111827}.t{font:500 14px ui-sans-serif,system-ui;fill:#475569}.code{font:700 13px ui-monospace,Menlo,monospace;fill:#075985}
      .line{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="740" fill="url(#bg)"/>
  <text class="title" x="60" y="64">Category Default-Rate EDA</text>
  <text class="sub" x="60" y="92">Private group-by style counts for income, education, occupation, organization.</text>

  <text class="label" x="78" y="152">CLIENT PREP</text>
  <text class="label" x="704" y="152">SERVER HE EXECUTION</text>

  <g filter="url(#shadow)">
    <rect x="72" y="184" width="226" height="104" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="94" y="214">Category policy</text>
    <text class="t" x="94" y="242">missing -> __MISSING__</text>
    <text class="t" x="94" y="264">large columns -> top-K</text>

    <rect x="346" y="184" width="226" height="104" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="368" y="214">Masks and values</text>
    <text class="t" x="368" y="242">category_mask</text>
    <text class="t" x="368" y="264">target_mask, amounts</text>

    <rect x="710" y="184" width="230" height="104" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text class="h" x="732" y="214">Encrypted counts</text>
    <text class="code" x="732" y="242">sum(mask)</text>
    <text class="code" x="732" y="264">sum(mask * target)</text>

    <rect x="988" y="184" width="230" height="104" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text class="h" x="1010" y="214">Encrypted sums</text>
    <text class="code" x="1010" y="242">sum(mask * AMT_CREDIT)</text>
    <text class="code" x="1010" y="264">sum(mask * income)</text>
  </g>
  <path class="line" d="M298 236 H338"/>
  <path class="line" d="M572 236 C636 236 642 236 702 236"/>
  <path class="line" d="M940 236 H980"/>

  <rect x="72" y="356" width="500" height="156" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text class="h" x="98" y="390">Server-upload bundle</text>
  <text class="t" x="98" y="420">crypto_context.bin, eval_sum_keys.bin, eval_mult_keys.bin</text>
  <text class="t" x="98" y="444">aggregate_manifest.csv</text>
  <text class="t" x="98" y="468">vectors/*.bin</text>
  <text class="t" x="98" y="492">no raw strings, no raw CSV, no secret key</text>

  <rect x="710" y="356" width="508" height="156" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text class="h" x="736" y="390">Client-readable report after decrypt</text>
  <text class="code" x="736" y="420">default_rate = default_count / count</text>
  <text class="code" x="736" y="444">avg_credit = credit_sum / count</text>
  <text class="code" x="736" y="468">avg_income = income_sum / count</text>
  <text class="t" x="736" y="492">Example: NAME_INCOME_TYPE = Working</text>

  <rect x="190" y="584" width="900" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="h" x="220" y="616">Design decision</text>
  <text class="t" x="220" y="642">Client does category selection and one-hot encoding because HE does not parse strings or discover top-K categories efficiently.</text>
</svg>
