<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Home Credit Bucket EDA</title>
  <desc id="desc">Client creates age, EXT_SOURCE, and DAYS_EMPLOYED bucket masks; server computes encrypted counts and default counts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#475569"/></marker>
    <style>
      .title{font:800 32px ui-sans-serif,system-ui;fill:#172033}.sub{font:400 15px ui-sans-serif,system-ui;fill:#64748b}
      .h{font:800 18px ui-sans-serif,system-ui;fill:#111827}.t{font:500 14px ui-sans-serif,system-ui;fill:#475569}.code{font:700 13px ui-monospace,Menlo,monospace;fill:#0e7490}
      .line{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text class="title" x="60" y="64">Age / EXT_SOURCE Bucket EDA</text>
  <text class="sub" x="60" y="92">Use bucket masks so the server can aggregate without encrypted comparisons.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="154" width="230" height="112" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="94" y="184">Age buckets</text>
    <text class="t" x="94" y="214">DAYS_BIRTH -> age years</text>
    <text class="t" x="94" y="238">lt_25, 25_34, ...</text>

    <rect x="360" y="154" width="230" height="112" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="382" y="184">Source buckets</text>
    <text class="t" x="382" y="214">EXT_SOURCE_1/2/3</text>
    <text class="t" x="382" y="238">ranges plus missing</text>

    <rect x="648" y="154" width="230" height="112" rx="8" fill="#ecfdf3" stroke="#86efac"/>
    <text class="h" x="670" y="184">Anomaly bucket</text>
    <text class="t" x="670" y="214">DAYS_EMPLOYED</text>
    <text class="t" x="670" y="238">365243 vs normal</text>

    <rect x="936" y="154" width="230" height="112" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text class="h" x="958" y="184">Server aggregate</text>
    <text class="code" x="958" y="214">sum(bucket_mask)</text>
    <text class="code" x="958" y="238">sum(mask * target)</text>
  </g>

  <path class="line" d="M302 210 H352"/>
  <path class="line" d="M590 210 H640"/>
  <path class="line" d="M878 210 H928"/>

  <rect x="110" y="350" width="470" height="150" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text class="h" x="138" y="384">Client sends encrypted</text>
  <text class="t" x="138" y="414">aggregate_manifest.csv</text>
  <text class="t" x="138" y="438">bucket masks in vectors/*.bin</text>
  <text class="t" x="138" y="462">TARGET mask chunks</text>
  <text class="t" x="138" y="486">eval sum and eval mult keys</text>

  <rect x="700" y="350" width="470" height="150" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text class="h" x="728" y="384">Client decrypts report</text>
  <text class="code" x="728" y="414">default_rate_by_age</text>
  <text class="code" x="728" y="438">default_rate_by_EXT_SOURCE_bucket</text>
  <text class="code" x="728" y="462">anomaly_default_rate</text>
  <text class="t" x="728" y="486">No server-side raw date or null logic.</text>

  <rect x="248" y="570" width="784" height="64" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text class="h" x="278" y="606">Why this works</text>
  <text class="t" x="450" y="606">Buckets turn hard encrypted comparisons into simple encrypted sums.</text>
</svg>
